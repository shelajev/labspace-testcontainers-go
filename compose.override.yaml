services:
  configurator:
    environment:
      PROJECT_CLONE_URL: https://github.com/shelajev/labspace-testcontainers-go

  workspace:
    image: olegselajev241/labspace-workspace-go
    configs:
      - source: go-setup-script
        target: /entrypoint.d/go-setup.sh
        mode: 0755

configs:
  go-setup-script:
    content: |
      #!/bin/bash
      set -e
      cd /home/coder/project
      echo "Downloading Go module dependencies..."
      go mod download 2>&1 || true
      echo "Go dependencies ready."
